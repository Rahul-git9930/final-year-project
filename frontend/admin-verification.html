<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - Quick Verification</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #0f5132; }
    .status { padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid; }
    .ok { background: #d4edda; border-left-color: #198754; color: #155724; }
    .error { background: #f8d7da; border-left-color: #dc3545; color: #721c24; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #0f5132; color: white; }
    .check { font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ Admin Dashboard - Complete Verification</h1>
    
    <div id="results"></div>
  </div>

  <script>
    const results = {
      total: 0,
      passed: 0,
      failed: 0,
      checks: []
    };

    // Check 1: Functions exist
    const requiredFunctions = [
      'loadDashboard', 'loadBooks', 'loadUsers', 'loadTransactions', 'loadFines', 
      'loadRequests', 'loadReports', 'loadSettings',
      'showAddBookForm', 'editBook', 'deleteBook', 'searchBooks',
      'showAddMemberForm', 'viewUserDetails',
      'returnBook', 'markFinePaid',
      'generateIssuedBooksReport', 'generateOverdueBooksReport', 'generateFineCollectionReport',
      'changePassword', 'approveRequest', 'rejectRequest', 'filterRequests',
      'handleNavigation', 'updateRequestBadge', 'fetchWithTimeout'
    ];

    requiredFunctions.forEach(func => {
      results.total++;
      if (typeof window[func] === 'function') {
        results.passed++;
        results.checks.push({ name: func, status: 'PASS', msg: 'Function exists' });
      } else {
        results.failed++;
        results.checks.push({ name: func, status: 'FAIL', msg: 'Function not found' });
      }
    });

    // Check 2: localStorage has token
    results.total++;
    const token = localStorage.getItem('token');
    if (token) {
      results.passed++;
      results.checks.push({ name: 'Token', status: 'PASS', msg: `Token exists (${token.substring(0, 20)}...)` });
    } else {
      results.failed++;
      results.checks.push({ name: 'Token', status: 'FAIL', msg: 'No token - login required' });
    }

    // Check 3: User data
    results.total++;
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.email && (user.role === 'admin' || user.role === 'librarian')) {
      results.passed++;
      results.checks.push({ name: 'User', status: 'PASS', msg: `${user.email} (${user.role})` });
    } else {
      results.failed++;
      results.checks.push({ name: 'User', status: 'FAIL', msg: 'Invalid user data or insufficient permissions' });
    }

    // Check 4: DOM elements
    results.total++;
    if (document.querySelector('.content')) {
      results.passed++;
      results.checks.push({ name: 'Content Area', status: 'PASS', msg: '.content element exists' });
    } else {
      results.failed++;
      results.checks.push({ name: 'Content Area', status: 'FAIL', msg: '.content element not found' });
    }

    // Display results
    let html = `
      <div class="status ok">
        <h2>✅ VERIFICATION RESULTS</h2>
        <p><strong>Total Checks:</strong> ${results.total}</p>
        <p><strong>Passed:</strong> <span style="color: #198754; font-weight: bold;">${results.passed}</span></p>
        <p><strong>Failed:</strong> <span style="color: #dc3545; font-weight: bold;">${results.failed}</span></p>
        <p><strong>Status:</strong> <span style="font-weight: bold; font-size: 18px;">
          ${results.failed === 0 ? '✅ ALL CHECKS PASSED' : '⚠️ SOME CHECKS FAILED'}
        </span></p>
      </div>
    `;

    html += '<h2>Detailed Results</h2>';
    html += '<table><tr><th>Check</th><th>Status</th><th>Details</th></tr>';

    results.checks.forEach(check => {
      const statusClass = check.status === 'PASS' ? '✅' : '❌';
      html += `<tr>
        <td><strong>${check.name}</strong></td>
        <td>${statusClass} ${check.status}</td>
        <td>${check.msg}</td>
      </tr>`;
    });

    html += '</table>';

    html += '<h2>Navigation Routes</h2>';
    html += `<table>
      <tr><th>Menu Item</th><th>Function</th><th>Status</th></tr>
      <tr><td>Dashboard</td><td>loadDashboard()</td><td>${typeof loadDashboard === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Books</td><td>loadBooks()</td><td>${typeof loadBooks === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Users</td><td>loadUsers()</td><td>${typeof loadUsers === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Transactions</td><td>loadTransactions()</td><td>${typeof loadTransactions === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Fines</td><td>loadFines()</td><td>${typeof loadFines === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Book Requests</td><td>loadRequests()</td><td>${typeof loadRequests === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Reports</td><td>loadReports()</td><td>${typeof loadReports === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Settings</td><td>loadSettings()</td><td>${typeof loadSettings === 'function' ? '✅' : '❌'}</td></tr>
    </table>`;

    html += '<h2>Key Operations</h2>';
    html += `<table>
      <tr><th>Operation</th><th>Function</th><th>Status</th></tr>
      <tr><td>Add Book</td><td>showAddBookForm()</td><td>${typeof showAddBookForm === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Add Member</td><td>showAddMemberForm()</td><td>${typeof showAddMemberForm === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Approve Request</td><td>approveRequest()</td><td>${typeof approveRequest === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Reject Request</td><td>rejectRequest()</td><td>${typeof rejectRequest === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Return Book</td><td>returnBook()</td><td>${typeof returnBook === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Mark Fine Paid</td><td>markFinePaid()</td><td>${typeof markFinePaid === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Generate Reports</td><td>generateIssuedBooksReport()</td><td>${typeof generateIssuedBooksReport === 'function' ? '✅' : '❌'}</td></tr>
      <tr><td>Change Password</td><td>changePassword()</td><td>${typeof changePassword === 'function' ? '✅' : '❌'}</td></tr>
    </table>`;

    document.getElementById('results').innerHTML = html;
  </script>
</body>
</html>
