<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Library Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #dcdcdc;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .signup-container {
      width: min(980px, 100%);
      min-height: 540px;
      display: grid;
      grid-template-columns: 2.1fr 1fr;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.2);
    }

    .form-panel {
      background: #f4f4f4;
      padding: clamp(18px, 3vw, 34px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-panel h1 {
      color: #111;
      font-size: 34px;
      margin-bottom: 6px;
    }

    .form-panel p {
      color: #666;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .signup-form {
      max-width: 520px;
      width: 100%;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      color: #444;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      height: 42px;
      border: 1px solid #c7c7c7;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #5f72d7;
      box-shadow: 0 0 0 3px rgba(95, 114, 215, 0.12);
    }

    .full {
      grid-column: 1 / -1;
    }

    .signup-button {
      width: 100%;
      margin-top: 8px;
      height: 44px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #5f7de2 0%, #7248a8 100%);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .signup-button:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .login-link {
      text-align: center;
      margin-top: 14px;
      color: #222;
      font-size: 14px;
    }

    .login-link a {
      color: #4e6de0;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .message {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
    }

    .error-message {
      background: #fde8e8;
      color: #b42318;
    }

    .success-message {
      background: #e9f9ee;
      color: #1d7a3f;
    }

    .overlay-panel {
      background: linear-gradient(165deg, #5f72d7 0%, #7248a8 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(18px, 3vw, 32px);
    }

    .overlay-content {
      text-align: center;
      max-width: 240px;
    }

    .overlay-content h2 {
      font-size: 40px;
      line-height: 1.1;
      margin-bottom: 18px;
    }

    .overlay-content p {
      font-size: 22px;
      line-height: 1.35;
      opacity: 0.95;
      margin-bottom: 26px;
    }

    .switch-btn {
      display: inline-block;
      min-width: 120px;
      height: 42px;
      line-height: 42px;
      border-radius: 999px;
      border: none;
      background: white;
      color: #6d4ba6;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .signup-container {
        grid-template-columns: 1fr;
      }

      .overlay-panel {
        min-height: 220px;
      }

      .overlay-content h2 {
        font-size: 32px;
      }

      .overlay-content p {
        font-size: 18px;
      }
    }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-panel {
        padding: 16px;
      }

      .form-panel h1 {
        font-size: 30px;
      }
    }
  </style>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="signup-container">
    <div class="form-panel">
      <h1>Sign Up</h1>
      <p>Create your LibraryHub account</p>

      <form class="signup-form" id="signupForm">
        <div class="message error-message" id="errorMessage"></div>
        <div class="message success-message" id="successMessage"></div>

        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Full Name">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="Password">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm Password">
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Phone Number">
          </div>

          <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" name="role" required>
              <option value="student">Student</option>
              <option value="member">Member</option>
            </select>
          </div>
        </div>

        <button type="submit" class="signup-button">Sign Up</button>

        <div class="login-link">
          Already have an account? <a href="/">Login</a>
        </div>
      </form>
    </div>

    <div class="overlay-panel">
      <div class="overlay-content">
        <h2>Welcome to LibraryHub</h2>
        <p>Manage books easily and sync instantly.</p>
        <a class="switch-btn" href="/">Switch</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      if (data.password !== data.confirmPassword) {
        errorDiv.textContent = 'Passwords do not match!';
        errorDiv.style.display = 'block';
        return;
      }

      delete data.confirmPassword;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          successDiv.textContent = 'Account created successfully! Redirecting to login...';
          successDiv.style.display = 'block';

          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          const errorMessage = result.details
            ? `${result.message}: ${result.details}`
            : result.message || 'Registration failed. Please try again.';
          errorDiv.textContent = errorMessage;
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
