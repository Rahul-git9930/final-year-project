<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner - Issue Book</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <style>
    .scanner-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    #barcode-scanner {
      border: 2px solid #4f46e5;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    #barcode-scanner video {
      width: 100%;
      height: auto;
    }
    
    #barcode-scanner .drawingBuffer {
      position: absolute;
      top: 0;
      left: 0;
    }
    
    .scanner-controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    
    .scanner-controls button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .start-btn {
      background: #198754;
      color: white;
    }
    
    .stop-btn {
      background: #dc3545;
      color: white;
    }
    
    .start-btn:hover {
      background: #157347;
    }
    
    .stop-btn:hover {
      background: #bb2d3b;
    }
    
    .scan-result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    
    .scan-result.success {
      background: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
    }
    
    .scan-result.error {
      background: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
    }
    
    .book-preview {
      margin-top: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      display: none;
    }
    
    .book-preview h3 {
      margin-top: 0;
      color: #4f46e5;
    }
    
    .book-info {
      margin: 10px 0;
    }
    
    .book-info strong {
      display: inline-block;
      width: 120px;
    }
    
    .issue-btn {
      margin-top: 15px;
      padding: 12px 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    
    .issue-btn:hover {
      background: #4338ca;
    }
    
    .manual-entry {
      margin-top: 20px;
      padding: 20px;
      background: #fff3cd;
      border-radius: 8px;
    }
    
    .manual-entry input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-top: 10px;
    }
    
    .back-btn {
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="scanner-container">
    <a href="student-dashboard.html" class="back-btn">â† Back to Dashboard</a>
    
    <h1>ðŸ“± Scan Book Barcode</h1>
    <p>Position the barcode within the camera frame to scan</p>
    
    <div id="barcode-scanner"></div>
    
    <div class="scanner-controls">
      <button class="start-btn" onclick="startScanner()">ðŸ“· Start Scanner</button>
      <button class="stop-btn" onclick="stopScanner()">â¹ï¸ Stop Scanner</button>
    </div>
    
    <div id="scanResult" class="scan-result"></div>
    
    <div id="bookPreview" class="book-preview">
      <h3>Book Found!</h3>
      <div id="bookDetails"></div>
      <button class="issue-btn" onclick="issueBook()">Issue This Book</button>
    </div>
    
    <div class="manual-entry">
      <h3>Manual Entry</h3>
      <p>Can't scan? Enter the Book ID or ISBN manually:</p>
      <input type="text" id="manualBookId" placeholder="Enter Book ID or ISBN">
      <button class="issue-btn" onclick="fetchBookManually()">Search Book</button>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    let scannedBookData = null;

    function startScanner() {
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#barcode-scanner'),
                constraints: {
                    width: 480,
                    height: 320,
                    facingMode: "environment"
                },
            },
            decoder: {
                readers: [
                    "code_128_reader",
                    "ean_reader",
                    "ean_8_reader",
                    "code_39_reader",
                    "code_39_vin_reader",
                    "codabar_reader",
                    "upc_reader",
                    "upc_e_reader",
                    "i2of5_reader"
                ],
                debug: {
                    showCanvas: false,
                    showPatches: false,
                    showFoundPatches: false,
                    showSkeleton: false,
                    showLabels: false,
                    showPatchLabels: false,
                    showRemainingPatchLabels: false,
                    boxFromPatches: {
                        showTransformed: false,
                        showTransformedBox: false,
                        showBB: false
                    }
                }
            },

        }, function (err) {
            if (err) {
                console.log(err);
                return
            }

            console.log("Initialization finished. Ready to start");
            Quagga.start();
        });

        Quagga.onProcessed(function (result) {
            var drawingCtx = Quagga.canvas.ctx.overlay,
                drawingCanvas = Quagga.canvas.dom.overlay;

            if (result) {
                if (result.boxes) {
                    drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
                    result.boxes.filter(function (box) {
                        return box !== result.box;
                    }).forEach(function (box) {
                        Quagga.ImageDebug.drawPath(box, { x: 0, y: 1 }, drawingCtx, { color: "green", lineWidth: 2 });
                    });
                }

                if (result.box) {
                    Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: "#00F", lineWidth: 2 });
                }

                if (result.codeResult && result.codeResult.code) {
                    Quagga.ImageDebug.drawPath(result.line, { x: 'x', y: 'y' }, drawingCtx, { color: 'red', lineWidth: 3 });
                }
            }
        });


        Quagga.onDetected(onScanSuccess);
    }

    function stopScanner() {
      Quagga.stop();
    }

    async function onScanSuccess(result) {
      var code = result.codeResult.code;
      console.log('Scanned:', code);
      
      // Stop scanner after successful scan
      stopScanner();
      
      // Show loading
      showMessage('ðŸ“– Fetching book details...', 'success');
      
      // Fetch book details
      await fetchBookDetails(code);
    }

    function onScanFailure(error) {
      // Silent - scanning continuously
    }

    async function fetchBookDetails(bookId) {
      const token = localStorage.getItem('token');
      
      try {
        const response = await fetch(`/api/books/scan/${encodeURIComponent(bookId)}`, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Book not found');
        }

        const data = await response.json();
        scannedBookData = data.book;
        
        displayBookPreview(scannedBookData);
        showMessage('âœ… Book found! Review details below.', 'success');
        
      } catch (error) {
        console.error('Error fetching book:', error);
        showMessage('âŒ ' + error.message, 'error');
        scannedBookData = null;
      }
    }

    async function fetchBookManually() {
      const bookId = document.getElementById('manualBookId').value.trim();
      
      if (!bookId) {
        showMessage('Please enter a Book ID or ISBN', 'error');
        return;
      }
      
      showMessage('ðŸ“– Searching for book...', 'success');
      await fetchBookDetails(bookId);
    }

    function displayBookPreview(book) {
      const preview = document.getElementById('bookPreview');
      const details = document.getElementById('bookDetails');
      
      details.innerHTML = `
        <div class="book-info"><strong>Title:</strong> ${book.title}</div>
        <div class="book-info"><strong>Author:</strong> ${book.author}</div>
        <div class="book-info"><strong>ISBN:</strong> ${book.isbn || book._id}</div>
        <div class="book-info"><strong>Category:</strong> ${book.category || 'N/A'}</div>
        <div class="book-info"><strong>Available:</strong> ${book.available || 0} / ${book.quantity || 0}</div>
        <div class="book-info"><strong>Status:</strong> 
          <span style="color: ${(book.available || 0) > 0 ? '#198754' : '#dc3545'}; font-weight: bold;">
            ${(book.available || 0) > 0 ? 'âœ… Available' : 'âŒ Not Available'}
          </span>
        </div>
      `;
      
      preview.style.display = 'block';
      
      // Disable issue button if not available
      const issueBtn = preview.querySelector('.issue-btn');
      if ((book.available || 0) <= 0) {
        issueBtn.disabled = true;
        issueBtn.style.background = '#6c757d';
        issueBtn.style.cursor = 'not-allowed';
        issueBtn.textContent = 'Book Not Available';
      } else {
        issueBtn.disabled = false;
        issueBtn.style.background = '#4f46e5';
        issueBtn.style.cursor = 'pointer';
        issueBtn.textContent = 'Issue This Book';
      }
    }

    async function issueBook() {
      if (!scannedBookData) {
        showMessage('No book selected', 'error');
        return;
      }

      if ((scannedBookData.available || 0) <= 0) {
        showMessage('This book is not available for issue', 'error');
        return;
      }

      const token = localStorage.getItem('token');
      
      if (!confirm(`Issue "${scannedBookData.title}" to your account?`)) {
        return;
      }

      try {
        const response = await fetch('/api/transactions/issue-scan', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            bookId: scannedBookData._id
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Failed to issue book');
        }

        const result = await response.json();
        
        showMessage('âœ… Book issued successfully! Redirecting...', 'success');
        
        // Hide book preview
        document.getElementById('bookPreview').style.display = 'none';
        scannedBookData = null;
        
        // Redirect to dashboard after 2 seconds
        setTimeout(() => {
          window.location.href = 'student-dashboard.html';
        }, 2000);
        
      } catch (error) {
        console.error('Error issuing book:', error);
        showMessage('âŒ ' + error.message, 'error');
      }
    }

    function showMessage(message, type) {
      const result = document.getElementById('scanResult');
      result.textContent = message;
      result.className = 'scan-result ' + type;
      result.style.display = 'block';
      
      if (type === 'success') {
        setTimeout(() => {
          result.style.display = 'none';
        }, 3000);
      }
    }

    // Check authentication
    if (!localStorage.getItem('token')) {
      alert('Please login first');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
