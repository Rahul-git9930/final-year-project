<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard Comprehensive Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #0f5132; }
    h2 { color: #198754; margin-top: 20px; }
    .test-section { margin: 20px 0; padding: 15px; background: #f9f9f9; border-left: 4px solid #0f5132; }
    .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .test-btn { padding: 10px; background: #0f5132; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .test-btn:hover { background: #0d3d24; }
    .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f9f9f9; font-weight: bold; }
    .function-list { list-style: none; padding: 0; }
    .function-list li { padding: 8px; margin: 5px 0; background: white; border-left: 3px solid #0f5132; }
    .function-list li.exists { border-left-color: #198754; }
    .function-list li.missing { border-left-color: #dc3545; }
  </style>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="container">
    <h1>ðŸ§ª Admin Dashboard - Comprehensive Test Suite</h1>
    
    <div class="test-section">
      <h2>Navigation Test</h2>
      <div class="button-grid">
        <button class="test-btn" onclick="testNav('Dashboard')">Test Dashboard</button>
        <button class="test-btn" onclick="testNav('Books')">Test Books</button>
        <button class="test-btn" onclick="testNav('Users')">Test Users</button>
        <button class="test-btn" onclick="testNav('Transactions')">Test Trans.</button>
        <button class="test-btn" onclick="testNav('Book Requests')">Test Requests</button>
        <button class="test-btn" onclick="testNav('Fines')">Test Fines</button>
        <button class="test-btn" onclick="testNav('Reports')">Test Reports</button>
        <button class="test-btn" onclick="testNav('Settings')">Test Settings</button>
      </div>
      <div id="navResult"></div>
    </div>

    <div class="test-section">
      <h2>Function Availability Check</h2>
      <button class="test-btn" onclick="checkFunctions()">Check All Functions</button>
      <div id="functionResult"></div>
    </div>

    <div class="test-section">
      <h2>API Connectivity Test</h2>
      <button class="test-btn" onclick="testAPIs()">Test All APIs</button>
      <div id="apiResult"></div>
    </div>

    <div class="test-section">
      <h2>Button Functionality Test</h2>
      <button class="test-btn" onclick="checkButtons()">Check All Buttons</button>
      <div id="buttonResult"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');

    function testNav(page) {
      const resultDiv = document.getElementById('navResult');
      try {
        if (typeof handleNavigation === 'function') {
          handleNavigation(page);
          resultDiv.innerHTML = `<div class="result success">âœ… Navigation to '${page}' works</div>`;
        } else {
          resultDiv.innerHTML = `<div class="result error">âŒ handleNavigation function not found</div>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error">âŒ Error: ${error.message}</div>`;
      }
    }

    function checkFunctions() {
      const resultDiv = document.getElementById('functionResult');
      const requiredFunctions = [
        'loadDashboard', 'loadBooks', 'loadUsers', 'loadTransactions', 'loadFines', 'loadRequests', 'loadReports', 'loadSettings',
        'showAddBookForm', 'editBook', 'deleteBook', 'searchBooks',
        'showAddMemberForm', 'viewUserDetails',
        'returnBook', 'markFinePaid',
        'generateIssuedBooksReport', 'generateOverdueBooksReport', 'generateFineCollectionReport',
        'changePassword',
        'approveRequest', 'rejectRequest', 'filterRequests',
        'handleNavigation', 'updateRequestBadge'
      ];

      let html = '<h3>Function Status:</h3><ul class="function-list">';
      let foundCount = 0;

      requiredFunctions.forEach(func => {
        const exists = typeof window[func] === 'function';
        if (exists) foundCount++;
        html += `<li class="${exists ? 'exists' : 'missing'}">
          ${exists ? 'âœ…' : 'âŒ'} ${func}
        </li>`;
      });

      html += '</ul>';
      html += `<p><strong>Total: ${foundCount}/${requiredFunctions.length} functions found</strong></p>`;
      resultDiv.innerHTML = html;
    }

    async function testAPIs() {
      const resultDiv = document.getElementById('apiResult');
      if (!token) {
        resultDiv.innerHTML = `<div class="result error">âŒ No token found - please login first</div>`;
        return;
      }

      const apis = [
        '/api/dashboard/stats',
        '/api/books',
        '/api/users',
        '/api/transactions',
        '/api/fines/my',
        '/api/requests',
        '/api/notifications',
        '/api/reviews'
      ];

      let html = '<h3>API Status:</h3>';
      let working = 0;

      for (const api of apis) {
        try {
          const response = await fetch(api, {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const status = response.ok ? 'âœ…' : 'âš ï¸';
          const className = response.ok ? 'success' : 'warning';
          if (response.ok) working++;
          html += `<div class="result ${className}">${status} ${api} (${response.status})</div>`;
        } catch (error) {
          html += `<div class="result error">âŒ ${api} - ${error.message}</div>`;
        }
      }

      html += `<p><strong>Working: ${working}/${apis.length} endpoints</strong></p>`;
      resultDiv.innerHTML = html;
    }

    function checkButtons() {
      const resultDiv = document.getElementById('buttonResult');
      const buttons = {
        'Dashboard': ['Dashboard info display'],
        'Books': ['Add New Book', 'Search Books', 'Edit Book', 'Delete Book'],
        'Users': ['Add Member', 'View Details'],
        'Transactions': ['Return Book'],
        'Fines': ['Mark Paid'],
        'Book Requests': ['Approve Request', 'Reject Request', 'Filter (Pending/Approved/Rejected)'],
        'Reports': ['Issued Books', 'Overdue Books', 'Fine Collection'],
        'Settings': ['Change Password']
      };

      let html = '<h3>Button Functionality Checklist:</h3>';
      html += '<table>';
      html += '<tr><th>Section</th><th>Buttons</th><th>Status</th></tr>';

      for (const [section, btnList] of Object.entries(buttons)) {
        html += `<tr>
          <td><strong>${section}</strong></td>
          <td>${btnList.join('<br>')}</td>
          <td><span style="color: #198754;">âœ… Implemented</span></td>
        </tr>`;
      }

      html += '</table>';
      resultDiv.innerHTML = html;
    }
  </script>
</body>
</html>
