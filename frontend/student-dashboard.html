<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Library Management System</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .dashboard {
      display: flex;
      min-height: 100dvh;
      gap: 20px;
      padding: 20px;
      background: #eef1f7;
    }
    .sidebar { width: 260px; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .sidebar h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .user-info { font-size: 13px; color: #666; margin-bottom: 20px; }
    .sidebar-menu { list-style: none; flex-grow: 1; }
    .sidebar-menu li { padding: 12px 16px; margin-bottom: 6px; border-radius: 10px; color: #6b7280; cursor: pointer; transition: all 0.3s; }
    .sidebar-menu li.active,
    .sidebar-menu li:hover { background: #eef2ff; color: #4f46e5; font-weight: 600; }
    .sidebar-footer { border-top: 1px solid #ddd; padding-top: 15px; }
    .content { flex: 1; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow-y: auto; }

    @media (max-width: 900px) {
      .dashboard {
        flex-direction: column;
        gap: 14px;
        padding: 14px;
      }

      .sidebar {
        width: 100%;
        padding: 18px;
        border-radius: 14px;
      }

      .content {
        width: 100%;
        padding: 20px;
        border-radius: 14px;
      }
    }

    @media (max-width: 600px) {
      .dashboard {
        padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        gap: 10px;
      }

      .sidebar {
        padding: 14px;
        border-radius: 12px;
      }

      .sidebar h2 {
        font-size: 18px;
        margin-bottom: 14px;
      }

      .sidebar-menu li {
        padding: 10px 12px;
      }

      .content {
        padding: 14px;
        border-radius: 12px;
      }
    }
  </style>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar">
      <h2>ðŸ“š Library Portal</h2>
      <div class="user-info">
        <p><strong id="userName">Student</strong></p>
        <p id="userRole">Student Member</p>
      </div>
      <ul class="sidebar-menu" id="sidebarMenu">
        <li class="active">Dashboard</li>
        <li>Search Books</li>
        <li>My Books</li>
        <li>Issue</li>
        <li>Scan QR Code</li>
        <li>Wishlist</li>
        <li>Fines & Payments</li>
        <li>History</li>
        <li>Profile</li>
      </ul>
      <div class="sidebar-footer">
        <button onclick="logout()" style="width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Logout</button>
      </div>
    </div>
    
    <div class="content">
      <h1>ðŸ“š Student Dashboard</h1>
      <p>Loading your information...</p>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="payment-handler.js"></script>
  <script src="student-dashboard.js"></script>
</body>
</html>
