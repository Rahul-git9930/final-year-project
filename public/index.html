<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LibraryHub Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="container">

  <!-- SIGN UP -->
  <div class="form-container sign-up">
    <form id="signupForm">
      <h2>Sign Up</h2>
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required minlength="6">
      <input type="tel" name="phone" placeholder="Phone Number (optional)">
      <select name="role" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd;">
        <option value="student">Student</option>
        <option value="member">Member</option>
      </select>
      <button type="submit">Sign Up</button>
      <p>Already have an account?
        <span onclick="toggle()">Login</span>
      </p>
    </form>
  </div>

  <!-- LOGIN -->
  <div class="form-container login">
    <form id="loginForm">
      <h2>Login</h2>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <p>Don't have an account?
        <span onclick="toggle()">Sign Up</span>
      </p>
    </form>
  </div>

  <!-- RIGHT PANEL -->
  <div class="overlay">
    <div class="overlay-panel">
      <h1 id="title">Welcome to LibraryHub</h1>
      <p id="desc">Manage books easily and sync instantly.</p>
      <button class="ghost" onclick="toggle()">Switch</button>
    </div>
  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
